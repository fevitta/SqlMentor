[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sql-tuner"
version = "0.1.0"
description = "CLI para coleta de contexto de SQL/procedures para tuning assistido por IA"
requires-python = ">=3.9"
dependencies = [
    "typer[all]>=0.9.0",
    "sqlglot>=20.0.0",
    "oracledb>=2.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "mcp[cli]>=1.0.0",
]

[project.scripts]
sql-tuner = "sql_tuner.cli:app"
sql-tuner-mcp = "sql_tuner.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
